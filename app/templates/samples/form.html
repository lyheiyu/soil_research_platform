{% extends 'base.html' %}
{% block content %}
<h1>{{ 'Edit' if item else 'New' }} sample</h1>

<form method="post">
  <label>
    Experiment
    <select name="experiment_id" required>
      {% for e in experiments %}
      <option value="{{ e.id }}" {% if item and item.experiment_id == e.id %}selected{% endif %}>
        {{ e.project.project_code }} / {{ e.experiment_code }}
      </option>
      {% endfor %}
    </select>
  </label>

  <label>
    Plot
    <select name="plot_id">
      <option value="">No plot</option>
      {% for p in plots %}
      <option value="{{ p.id }}" {% if item and item.plot_id == p.id %}selected{% endif %}>
        {{ p.experiment.project.project_code }} / {{ p.experiment.experiment_code }} / {{ p.plot_code }}
      </option>
      {% endfor %}
    </select>
  </label>

  <label>Sample ID<input name="sample_id" value="{{ item.sample_id if item else '' }}" required></label>

  <div class="grid">
    <label>
      Timepoint
      <select name="sampling_timepoint">
        <option value="">Select</option>
        <option value="T0" {% if item and item.sampling_timepoint == 'T0' %}selected{% endif %}>T0</option>
        <option value="T1" {% if item and item.sampling_timepoint == 'T1' %}selected{% endif %}>T1</option>
        <option value="T2" {% if item and item.sampling_timepoint == 'T2' %}selected{% endif %}>T2</option>
      </select>
    </label>

    <label>Layer<input name="layer_id" value="{{ item.layer_id if item else '' }}"></label>
  </div>

  <div class="grid">
    <label>Depth from (cm)<input type="number" name="depth_from_cm" value="{{ item.depth_from_cm if item and item.depth_from_cm is not none else '' }}"></label>
    <label>Depth to (cm)<input type="number" name="depth_to_cm" value="{{ item.depth_to_cm if item and item.depth_to_cm is not none else '' }}"></label>
  </div>

  <div class="grid">
    <label>Sampling date<input type="date" name="sampling_date" value="{{ item.sampling_date if item and item.sampling_date else '' }}"></label>
    <label>Author<input name="author" value="{{ item.author if item else '' }}"></label>
  </div>

  <div class="grid">
    <label>
      Clouds
      <select name="clouds">
        <option value="">Select</option>
        <option value="sunny" {% if item and item.clouds == 'sunny' %}selected{% endif %}>sunny</option>
        <option value="partly_clouded" {% if item and item.clouds == 'partly_clouded' %}selected{% endif %}>partly clouded</option>
        <option value="overcast" {% if item and item.clouds == 'overcast' %}selected{% endif %}>overcast</option>
      </select>
    </label>

    <label>
      Temperature band
      <select name="temperature_band">
        <option value="">Select</option>
        <option value="<10" {% if item and item.temperature_band == '<10' %}selected{% endif %}><10</option>
        <option value="10-20" {% if item and item.temperature_band == '10-20' %}selected{% endif %}>10-20</option>
        <option value="20-30" {% if item and item.temperature_band == '20-30' %}selected{% endif %}>20-30</option>
        <option value=">30" {% if item and item.temperature_band == '>30' %}selected{% endif %}>>30</option>
      </select>
    </label>
  </div>

  <label>
    Rainfall condition
    <input name="rainfall_condition" value="{{ item.rainfall_condition if item else '' }}" placeholder="e.g. rain in last week">
  </label>

  <button type="submit">Save</button>
  <a href="/samples" role="button" class="secondary secondary-btn">Cancel</a>
</form>
{% endblock %}
