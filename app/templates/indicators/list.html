{% extends 'base.html' %}
{% block content %}
<header class="page-header"><h1>Indicators</h1></header>
<div class="toolbar"><form method="get"><input name="q" value="{{ q }}" placeholder="Search indicators..."><button type="submit">Search</button></form><a href="/indicators/new" role="button">Add new</a></div>
<div class="table-wrap"><table><thead><tr><th>Code</th><th>Name</th><th>Unit</th><th>Type</th><th>Category</th><th>Actions</th></tr></thead><tbody>{% for item in items %}<tr><td>{{ item.indicator_code }}</td><td>{{ item.indicator_name }}</td><td>{{ item.default_unit }}</td><td>{{ item.value_type }}</td><td>{{ item.category }}</td><td class="actions"><a href="/indicators/{{ item.id }}/edit" role="button" class="secondary secondary-btn">Edit</a><form class="inline-form" method="post" action="/indicators/{{ item.id }}/delete"><button class="danger-btn">Delete</button></form></td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
