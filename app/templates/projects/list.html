{% extends 'base.html' %}
{% block content %}
<header class="page-header"><h1>Projects</h1></header>
<div class="toolbar">
  <form method="get"><input name="q" value="{{ q }}" placeholder="Search projects..."><button type="submit">Search</button></form>
  <a href="/projects/new" role="button">Add new</a>
</div>
<div class="table-wrap"><table><thead><tr><th>Project code</th><th>Country</th><th>Round</th><th>Approval</th><th>Title</th><th>Actions</th></tr></thead><tbody>
{% for item in items %}<tr><td>{{ item.project_code }}</td><td>{{ item.country_code }}</td><td>{{ item.round_no }}</td><td>{{ item.approval_no }}</td><td>{{ item.title }}</td><td class="actions"><a href="/projects/{{ item.id }}/edit" role="button" class="secondary secondary-btn">Edit</a><form class="inline-form" method="post" action="/projects/{{ item.id }}/delete"><button class="danger-btn">Delete</button></form></td></tr>{% endfor %}
</tbody></table></div>
{% endblock %}
